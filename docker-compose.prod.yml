version: "3.9"

# Production overrides. Run with:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up --build

services:

  vue-ui:
    build:
      # Target the 'production' stage which serves the compiled Vite build via nginx
      target: production
    ports:
      # nginx serves on port 80 inside the container
      - "80:80"
    # Automatically restart the container if it crashes or the host reboots
    restart: always

  api:
    build:
      # Target the 'prod' stage which excludes dev dependencies for a leaner image
      target: prod
    ports:
      - "8000:8000"
    # Automatically restart the container if it crashes or the host reboots
    restart: always
